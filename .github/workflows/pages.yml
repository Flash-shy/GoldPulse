# Static export of apps/web → GitHub Pages (project site: /<repo>/).
# Repo Settings → Pages → Build and deployment → Source: GitHub Actions.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      # Default: basePath /GoldPulse for https://user.github.io/GoldPulse/
      # If you use a custom domain (e.g. gold.sunhaoyang.net → CNAME to user.github.io), set repo Variable
      # GITHUB_PAGES_BASE_PATH to "root" so assets load from site root (GitHub serves project site at / on that host).
      - name: Build static site
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_API_BASE: ${{ vars.NEXT_PUBLIC_API_BASE }}
          PAGES_BASE_MODE: ${{ vars.GITHUB_PAGES_BASE_PATH }}
        run: |
          REPO="${{ github.event.repository.name }}"
          if [ "$PAGES_BASE_MODE" = "root" ]; then
            export GITHUB_PAGES_BASE_PATH=
          else
            export GITHUB_PAGES_BASE_PATH="/${REPO}"
          fi
          npm run build -w web

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
