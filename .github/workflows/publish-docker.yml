# Build and push API + Web images to GitHub Container Registry (ghcr.io).
# Set repository Variable NEXT_PUBLIC_API_BASE to your public API URL before relying on the web image in production.

name: Publish Docker images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: publish-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Registry and image names (GHCR requires lowercase)
        id: names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "registry=ghcr.io/${OWNER}" >> "$GITHUB_OUTPUT"
          echo "api_image=ghcr.io/${OWNER}/goldpulse-api" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/${OWNER}/goldpulse-web" >> "$GITHUB_OUTPUT"

      - name: Resolve NEXT_PUBLIC_API_BASE for web build
        id: web_api
        run: |
          BASE="${V_NEXT_PUBLIC_API_BASE}"
          if [ -z "$BASE" ]; then
            BASE="http://localhost:8000"
            echo "::notice::NEXT_PUBLIC_API_BASE not set (using default localhost). Set repo Variable NEXT_PUBLIC_API_BASE for production browser API URL."
          fi
          {
            echo "NEXT_PUBLIC_API_BASE<<__EOF__"
            echo "$BASE"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"
        env:
          V_NEXT_PUBLIC_API_BASE: ${{ vars.NEXT_PUBLIC_API_BASE }}

      - name: Docker meta (API)
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.names.outputs.api_image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

      - name: Docker meta (Web)
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.names.outputs.web_image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ steps.web_api.outputs.NEXT_PUBLIC_API_BASE }}
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
