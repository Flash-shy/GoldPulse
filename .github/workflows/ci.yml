name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Line counts
        run: chmod +x stats.sh && ./stats.sh

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build stack
        run: docker compose build
